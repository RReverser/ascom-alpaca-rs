name: Rust

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  clippy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        network: [client, server]
        # Camera and telescope have some special logic; other devices don't so we pick focuser as a random representative.
        device: [camera, telescope, focuser]
        include:
          # Also make sure that maximum configuration works as expected.
          - network: client,server
            device: all-devices

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}
      - name: Clippy check
        run: cargo clippy --locked --all --all-targets --features ${{ matrix.network }},${{ matrix.device }}

  discovery-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}
      - name: Run discovery tests
        run: cargo test --locked --features client,server,all-devices,test --lib -- discovery::tests::test_unspecified_v4_only discovery::tests::test_loopback_v6_only
